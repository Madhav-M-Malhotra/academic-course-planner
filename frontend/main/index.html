<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Directory</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/main/style.css">
</head>
<body class="bg-light p-4">
    <!-- Header with Logout -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Academic Course Planner</h2>
        <div class="d-flex align-items-center gap-3">
            <form method="GET" action="/auth/logout" class="m-0">
                <button class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>

    <!-- Filters -->
    <div class="card mb-4" id="filterCard">
        <div class="card-body">
            <h6 class="card-title fw-bold">Filter Course</h6>
            <form id="filterForm">
                <div class="row g-3 text-secondary small">
                    <div class="col-md-2">
                        <label class="form-label mb-1">Time Slot (Day)</label>
                        <select class="form-select form-select-sm" id="filterDay">
                            <option value="All">All Days</option>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">Time Slot (Hours)</label>
                        <select class="form-select form-select-sm" id="filterTimeSlot">
                            <option value="All">All Times</option>
                            <option value="08:00">08:00 – 09:00</option>
                            <option value="09:00">09:00 – 10:00</option>
                            <option value="10:00">10:00 – 11:00</option>
                            <option value="11:00">11:00 – 12:00</option>
                            <option value="12:00">12:00 – 13:00</option>
                            <option value="13:00">13:00 – 14:00</option>
                            <option value="14:00">14:00 – 15:00</option>
                            <option value="15:00">15:00 – 16:00</option>
                            <option value="16:00">16:00 – 17:00</option>
                            <option value="17:00">17:00 – 18:00</option>
                            <option value="18:00">18:00 – 19:00</option>
                            <option value="19:00">19:00 – 20:00</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">Credits</label>
                        <select class="form-select form-select-sm" id="filterCredits">
                            <option value="All">All Credits</option>
                            <option value="1.5">1.5</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">GER Category</label>
                        <select class="form-select form-select-sm" id="filterGer">
                            <option value="All">All Categories</option>
                            <option value="Quantitative/Data Sciences">Quantitative/Data Sciences</option>
                            <option value="Humanities">Humanities</option>
                            <option value="Social Sciences">Social Sciences</option>
                            <option value="Not Applicable">Not Applicable</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label mb-1">Faculty</label>
                        <select class="form-select form-select-sm" id="filterFaculty">
                            <option value="All">All Faculty</option>
                            <option value="Harsh Mehta">Harsh Mehta</option>
                            <option value="Gatha Joshipura">Gatha Joshipura</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label mb-1">Search Course Name / Code</label>
                        <input type="text" class="form-control form-control-sm" id="searchQuery" placeholder="search...">
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Timetable View -->
    <div class="card mb-4 shadow-sm border-0">
        <div class="card-body">
            <div class="d-flex justify-content-between border-bottom pb-2">
                <h5 class="fw-bold mb-0">Timetable</h5>
                <button id="downloadTimetableBtn" class="btn btn-sm btn-outline-dark">Download as PDF</button>
            </div>
            <div id="timetableContainer" class="mt-3 overflow-auto p-2 bg-white rounded">
                <p class="text-muted small">No courses added yet.</p>
            </div>
        </div>
    </div>

    <!-- Main View -->
    <div class="row row-cols-1 row-cols-lg-3 g-4 align-items-start" id="courseDirectoryContainer">
        <!-- Schools will be injected here -->
    </div>

    <!-- Clash Modal -->
    <div class="modal fade" id="clashModal" tabindex="-1" aria-labelledby="clashModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title" id="clashModalLabel">Course Conflict Detected</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="clashModalBody">
                    <!-- Message goes here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/main/script.js"></script>
</body>
</html>
